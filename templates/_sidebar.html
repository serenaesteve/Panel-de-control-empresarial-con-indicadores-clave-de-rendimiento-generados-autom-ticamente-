<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="white"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
    </div>
    <div class="logo-text">
      <div class="logo-s">s.<span class="logo-rest">Business Health Center</span></div>
      <div class="logo-company">{{ user_company or 'Mi empresa' }}</div>
    </div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section">Panel</div>
    <a class="nav-item {% if request.endpoint == 'dashboard' %}active{% endif %}" href="{{ url_for('dashboard') }}">
      <span class="ni"><svg viewBox="0 0 20 20" fill="currentColor" width="15" height="15"><path d="M3 4a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H4a1 1 0 01-1-1V4zm0 8a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H4a1 1 0 01-1-1v-4zm8-8a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1V4zm0 8a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z"/></svg></span>
      Dashboard
    </a>
    <a class="nav-item {% if request.endpoint == 'analiticas' %}active{% endif %}" href="{{ url_for('analiticas') }}">
      <span class="ni"><svg viewBox="0 0 20 20" fill="currentColor" width="15" height="15"><path d="M2 11a1 1 0 011-1h2a1 1 0 011 1v5a1 1 0 01-1 1H3a1 1 0 01-1-1v-5zm6-4a1 1 0 011-1h2a1 1 0 011 1v9a1 1 0 01-1 1H9a1 1 0 01-1-1V7zm6-3a1 1 0 011-1h2a1 1 0 011 1v12a1 1 0 01-1 1h-2a1 1 0 01-1-1V4z"/></svg></span>
      Analíticas
    </a>
    <a class="nav-item {% if request.endpoint == 'objetivos' %}active{% endif %}" href="{{ url_for('objetivos') }}">
      <span class="ni"><svg viewBox="0 0 20 20" fill="currentColor" width="15" height="15"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg></span>
      Objetivos
    </a>

    <div class="nav-section">Datos</div>
    <a class="nav-item {% if request.endpoint == 'importar' %}active{% endif %}" href="{{ url_for('importar') }}">
      <span class="ni"><svg viewBox="0 0 20 20" fill="currentColor" width="15" height="15"><path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd"/></svg></span>
      Importar Excel
    </a>
    <a class="nav-item" href="{{ url_for('descargar_plantilla') }}">
      <span class="ni"><svg viewBox="0 0 20 20" fill="currentColor" width="15" height="15"><path fill-rule="evenodd" d="M6 2a2 2 0 00-2 2v12a2 2 0 002 2h8a2 2 0 002-2V7.414A2 2 0 0015.414 6L12 2.586A2 2 0 0010.586 2H6zm5 6a1 1 0 10-2 0v3.586l-1.293-1.293a1 1 0 10-1.414 1.414l3 3a1 1 0 001.414 0l3-3a1 1 0 00-1.414-1.414L11 11.586V8z" clip-rule="evenodd"/></svg></span>
      Plantilla Excel
    </a>

    <div class="nav-section">Cuenta</div>
    <a class="nav-item {% if request.endpoint == 'profile' %}active{% endif %}" href="{{ url_for('profile') }}">
      <span class="ni"><svg viewBox="0 0 20 20" fill="currentColor" width="15" height="15"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/></svg></span>
      Perfil

    <a class="nav-item" href="{{ url_for('logout') }}">
      <span class="ni"><svg viewBox="0 0 20 20" fill="currentColor" width="15" height="15"><path fill-rule="evenodd" d="M3 3a1 1 0 00-1 1v12a1 1 0 102 0V4a1 1 0 00-1-1zm10.293 9.293a1 1 0 001.414 1.414l3-3a1 1 0 000-1.414l-3-3a1 1 0 10-1.414 1.414L14.586 9H7a1 1 0 100 2h7.586l-1.293 1.293z" clip-rule="evenodd"/></svg></span>
      Cerrar sesión
    </a>

  <div class="sidebar-footer">
    <a class="user-chip" href="{{ url_for('profile') }}">
      <div class="user-avatar">{{ user_name[0].upper() }}</div>
      <div class="user-info">
        <div class="user-name">{{ user_name }}</div>
        <div class="user-role">Administrador</div>
      </div>
      <svg viewBox="0 0 20 20" fill="currentColor" width="14" height="14" style="margin-left:auto;color:var(--text3);flex-shrink:0;"><path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"/></svg>
    </a>
  </div>
</aside>
