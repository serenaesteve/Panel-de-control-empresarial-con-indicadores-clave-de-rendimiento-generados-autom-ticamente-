<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Dashboard{% endblock %} — s.Business Health Center</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0f1923;
  --bg2:      #131f2e;
  --bg3:      #172130;
  --card:     #1a2535;
  --card2:    #1f2d3d;
  --card3:    #243242;
  --border:   rgba(255,255,255,0.06);
  --border2:  rgba(255,255,255,0.11);
  --border3:  rgba(255,255,255,0.18);
  --text:     #e8f0f8;
  --text2:    #7a9bb5;
  --text3:    #3d5a73;
  --accent:   #2dd4bf;
  --accent2:  #0891b2;
  --accent3:  #06b6d4;
  --glow:     rgba(45,212,191,0.12);
  --glow2:    rgba(45,212,191,0.06);
  --green:    #4ade80;
  --red:      #fb7185;
  --amber:    #fbbf24;
  --blue:     #60a5fa;
  --pink:     #e879f9;
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.25);
  --shadow-md: 0 4px 20px rgba(0,0,0,0.35);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.45);
  --shadow-accent: 0 4px 24px rgba(45,212,191,0.15);
  --radius:    16px;
  --radius-sm: 10px;
  --radius-xs: 6px;
  --font-display: 'Plus Jakarta Sans', sans-serif;
  --font-serif:   'Instrument Serif', serif;
  --font-mono:    'JetBrains Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-display);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}
a { color: inherit; text-decoration: none; }
input, select, textarea, button { font-family: var(--font-display); }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(45,212,191,0.2); border-radius: 99px; }
::-webkit-scrollbar-thumb:hover { background: rgba(45,212,191,0.35); }
</style>
{% block extra_head %}{% endblock %}
</head>
<body>
{% block body %}{% endblock %}
{% block scripts %}{% endblock %}
</body>
</html>
